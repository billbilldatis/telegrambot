name: Trends Bot
permissions:
  contents: write
on:
  schedule:
    - cron: "*/10 * * * *"
  push:
    branches: 
    - main
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    environment: env
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Show files
        run: ls -R
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        run: python bot.py
        env:
            TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
            CHAT_ID: ${{ secrets.CHAT_ID }}
      
      - name: Save seen.json
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add seen.json
          git commit -m "update seen" || echo "no changes"
          git push
